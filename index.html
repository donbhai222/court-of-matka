<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Panel Chart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://courtofmatka.com/assets/css/styles.css">
</head>
<body>
    <div class="header-wrapper">
        <div class="logo">
            <h1 class="site-title"><a href="/" class="title-magic">BIG</a> <a href="/" class="title-panel">MAGIC PANEL CHART</a></h1>
        </div>
    </div>

    <div class="container-fluid">
        <!-- मार्केट सिलेक्शन -->
        <div class="market_dropdown_container">
            <select id="marketSelect" class="market-dropdown" onchange="loadChartData()">
                <option value="BigMagic">BIG MAGIC PANEL CHART</option>
                <option value="GreatBazar">GREAT BAZAR PANEL CHART</option>
            </select>
        </div>

        <!-- चार्ट टेबल -->
        <div class="chart_container">
            <table id="magicChart" class="panel-chart chart-table" border="1" style="width: 90%; margin: 0 auto; text-align: center;">
                <thead>
                    <tr style="background: #f2f2f2;">
                        <th>Date</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                    </tr>
                </thead>
                <tbody id="chartBody">
                    <tr><td colspan="7">डेटा लोड हो रहा है...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- पेमेंट और स्कैनर सेक्शन -->
        <div id="payment-section" style="text-align: center; margin-top: 40px; padding: 20px; border: 2px dashed #333; width: 90%; margin: 40px auto;">
            <h3>SUBSCRIPTION & PAYMENT</h3>
            <p><strong>Name:</strong> OMKAR YADAV</p>
            <!-- यहाँ अपना QR कोड लिंक डालें -->
            <img src="YOUR_QR_CODE_IMAGE_URL" alt="Scanner" style="width: 200px; border: 2px solid #000;">
            <p><strong>Charges:</strong> 399/- (Pana) | 999/- (Jodi) | 599/- (Close)</p>
            <button class="btn btn-success">PAY NOW</button>
        </div>
    </div>

    <script>
    async function loadChartData() {
        const sheetName = document.getElementById('marketSelect').value;
        const sheetId = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        const tbody = document.getElementById('chartBody');
        
        tbody.innerHTML = '<tr><td colspan="7">लोड हो रहा है...</td></tr>';
        
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            tbody.innerHTML = '';
            rows.forEach(row => {
                const cols = row.split(',');
                let tr = '<tr>';
                cols.forEach(col => {
                    tr += `<td>${col.replace(/"/g, '').replace(/;/g, '<br>')}</td>`;
                });
                tr += '</tr>';
                tbody.innerHTML += tr;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="7">Error loading data.</td></tr>';
        }
    }
    window.onload = loadChartData;
    </script>
</body>
</html>
